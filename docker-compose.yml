services:
  ev-transition:
    build: .
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      - PYTHONPATH=/workspace/src
      - MODEL_DIR=/workspace/models
      - FRONTEND_ORIGIN=http://localhost:5173
    volumes:
      - .:/workspace
      - /workspace/node_modules
      - /workspace/app/backend/node_modules
      - /workspace/app/frontend/node_modules

